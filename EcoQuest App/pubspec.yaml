name: namer_app
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.1+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  english_words: ^4.0.0
  provider: ^6.1.4
  flutter_local_notifications: ^19.0.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  permission_handler: ^11.4.0
  go_router: ^14.8.1
  image_picker: ^1.0.4
  http: ^1.2.1
  mime: ^1.0.4
  path: ^1.8.3
  cloud_firestore: ^5.6.6
  intl_phone_field: ^3.1.0
  health: ^12.2.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  test: ^1.25.15
  flutter_launcher_icons: ^0.14.3

flutter_icons:
  android: true
  ios: true
  image_path: "assets/appIcon.png"
  adaptive_icon_foreground: "assets/play_store_512.png"
  adaptive_icon_background: "#1875BC"


flutter:
  uses-material-design: true

  assets:
    - assets/